<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>2009Scape Mobile Wiki</title>
    <link rel="stylesheet" href="global.css">
</head>
<body>

    <section class="hero">
        <div class="hero-inner">
            <h1 class="logo">2009<span class="highlight">WIKI</span></h1>
            <p class="tagline">Search items, quests, and calculators</p>
            
            <div class="search-bar">
                <input type="text" id="wikiSearch" placeholder="Search the archives...">
                <button id="searchBtn">🔍</button>
            </div>
        </div>
    </section>

    <main class="app-container">
        <div class="quick-nav">
            <div class="nav-item" data-type="combat">
                <div class="icon-circle">⚔️</div>
                <span>Combat</span>
            </div>
            <div class="nav-item" data-type="skills">
                <div class="icon-circle">⚒️</div>
                <span>Skills</span>
            </div>
            <div class="nav-item" data-type="quests">
                <div class="icon-circle">📜</div>
                <span>Quests</span>
            </div>
            <div class="nav-item" data-type="money">
                <div class="icon-circle">💰</div>
                <span>Money</span>
            </div>
        </div>

        <section class="featured">
            <h3>Recent Updates</h3>
            <div class="update-card">
                <span class="date">Mar 13</span>
                <h4>God Wars Dungeon Strategy</h4>
                <p>New mobile-optimized prayer flicking guide...</p>
            </div>
        </section>
    </main>

    <nav class="tab-bar">
        <a href="#" class="tab active">Home</a>
        <a href="#" class="tab">Map</a>
        <a href="#" class="tab">Tools</a>
        <a href="#" class="tab">Wiki Gear</a>
    </nav>

    <script>
        // Search functionality
        const searchInput = document.getElementById('wikiSearch');
        
        searchInput.addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                alert('Searching for: ' + searchInput.value);
                // We can point this to a specific URL later
            }
        });

        // Haptic feedback feel for mobile buttons
        const navItems = document.querySelectorAll('.nav-item');
        navItems.forEach(item => {
            item.addEventListener('touchstart', () => {
                item.style.opacity = "0.7";
            });
            item.addEventListener('touchend', () => {
                item.style.opacity = "1";
            });
        });
    </script>
</body>
</html>

            </div>
        </section>
    </main>

    <script>function toggleDetails(step) {
    const box = document.getElementById('details-box');
    const text = document.getElementById('details-text');
    box.classList.remove('hidden');

    const content = {
        'apk-step': 'Head to the GitHub releases and download the .apk file. Ensure "Install from Unknown Sources" is enabled in your Android settings.',
        'ram-step': 'We recommend allocating at least 2GB (2048MB) of RAM in the launcher settings to avoid crashes in crowded areas like Grand Exchange.'
    };

    text.innerText = content[step];
}
</script>
</body>
</html>
