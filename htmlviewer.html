<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>HTML Viewer</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Syne:wght@400;700;800&display=swap');

  :root {
    --bg: #0a0a0f;
    --surface: #111118;
    --border: #1e1e2e;
    --accent: #7c6af7;
    --accent2: #f76a8f;
    --text: #e8e6f0;
    --muted: #6b6880;
    --bar-h: 52px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  html, body {
    height: 100%;
    overflow: hidden;
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
  }

  /* ── TOP BAR ── */
  #topbar {
    position: fixed;
    top: 0; left: 0; right: 0;
    height: var(--bar-h);
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 0 10px;
    z-index: 1000;
    backdrop-filter: blur(12px);
  }

  #logo {
    font-size: 13px;
    font-weight: 800;
    letter-spacing: 0.08em;
    color: var(--accent);
    white-space: nowrap;
    flex-shrink: 0;
  }
  #logo span { color: var(--accent2); }

  #url-bar {
    flex: 1;
    height: 32px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'JetBrains Mono', monospace;
    font-size: 11px;
    padding: 0 10px;
    outline: none;
    min-width: 0;
    transition: border-color .2s;
  }
  #url-bar:focus { border-color: var(--accent); }

  .bar-btn {
    width: 32px; height: 32px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-size: 15px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    flex-shrink: 0;
    transition: background .15s, border-color .15s;
    user-select: none;
  }
  .bar-btn:active { background: var(--accent); border-color: var(--accent); }

  /* ── IFRAME ── */
  #frame-wrap {
    position: fixed;
    top: var(--bar-h);
    left: 0; right: 0; bottom: 0;
  }

  #viewer {
    width: 100%; height: 100%;
    border: none;
    background: #fff;
  }

  /* ── LANDING ── */
  #landing {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 24px;
    padding: 32px 24px;
    text-align: center;
    background: var(--bg);
    z-index: 10;
  }

  .landing-icon {
    width: 80px; height: 80px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border-radius: 24px;
    display: flex; align-items: center; justify-content: center;
    font-size: 36px;
    box-shadow: 0 0 40px rgba(124,106,247,.35);
    animation: pulse 3s ease-in-out infinite;
  }
  @keyframes pulse {
    0%,100% { box-shadow: 0 0 30px rgba(124,106,247,.3); }
    50%      { box-shadow: 0 0 60px rgba(124,106,247,.6); }
  }

  .landing-title {
    font-size: 26px;
    font-weight: 800;
    letter-spacing: -.01em;
    line-height: 1.2;
  }
  .landing-title span { color: var(--accent); }

  .landing-sub {
    font-size: 14px;
    color: var(--muted);
    max-width: 280px;
    line-height: 1.6;
  }

  .open-btn {
    display: flex; align-items: center; gap: 10px;
    background: linear-gradient(135deg, var(--accent), var(--accent2));
    border: none;
    color: #fff;
    font-family: 'Syne', sans-serif;
    font-size: 15px;
    font-weight: 700;
    padding: 14px 28px;
    border-radius: 14px;
    cursor: pointer;
    transition: transform .15s, box-shadow .15s;
    box-shadow: 0 4px 20px rgba(124,106,247,.4);
    letter-spacing: .03em;
  }
  .open-btn:active { transform: scale(.96); }

  .recent-section { width: 100%; max-width: 360px; }
  .recent-label {
    font-size: 11px;
    font-weight: 700;
    letter-spacing: .1em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
    text-align: left;
  }
  .recent-list { display: flex; flex-direction: column; gap: 6px; }
  .recent-item {
    display: flex; align-items: center; gap: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 10px 14px;
    cursor: pointer;
    transition: border-color .15s, background .15s;
    text-align: left;
  }
  .recent-item:active { background: var(--border); }
  .recent-item .ri-icon { font-size: 18px; flex-shrink: 0; }
  .recent-item .ri-name {
    font-size: 13px; font-weight: 700;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    flex: 1; min-width: 0;
  }
  .recent-item .ri-size { font-size: 11px; color: var(--muted); flex-shrink: 0; }

  /* ── BOTTOM BAR ── */
  #bottombar {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 48px;
    background: var(--surface);
    border-top: 1px solid var(--border);
    display: none;
    align-items: center;
    justify-content: space-around;
    z-index: 1000;
    padding-bottom: env(safe-area-inset-bottom);
  }
  #bottombar.visible { display: flex; }

  .bb-btn {
    flex: 1;
    height: 100%;
    background: none;
    border: none;
    color: var(--muted);
    font-size: 18px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: color .15s;
    gap: 6px;
  }
  .bb-btn span { font-size: 11px; font-family: 'Syne', sans-serif; font-weight: 700; }
  .bb-btn:active { color: var(--accent); }

  /* ── TOAST ── */
  #toast {
    position: fixed;
    bottom: 64px; left: 50%; transform: translateX(-50%) translateY(20px);
    background: var(--accent);
    color: #fff;
    font-size: 13px;
    font-weight: 700;
    padding: 10px 20px;
    border-radius: 50px;
    pointer-events: none;
    opacity: 0;
    transition: opacity .3s, transform .3s;
    white-space: nowrap;
    z-index: 9999;
    letter-spacing: .04em;
  }
  #toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* adjust frame when bottom bar visible */
  body.has-file #frame-wrap { bottom: 48px; }
  body.has-file #landing { display: none; }
</style>
</head>
<body>

<!-- TOP BAR -->
<div id="topbar">
  <div id="logo">HTM<span>L</span></div>
  <input id="url-bar" type="text" placeholder="file loaded here…" readonly />
  <div class="bar-btn" id="btn-open" title="Open file">📂</div>
  <div class="bar-btn" id="btn-refresh" title="Reload">↺</div>
</div>

<!-- MAIN AREA -->
<div id="frame-wrap">
  <!-- LANDING -->
  <div id="landing">
    <div class="landing-icon">🌐</div>
    <div class="landing-title">HTML<span>Viewer</span></div>
    <div class="landing-sub">Load any .html file from your device and render it instantly — no server needed.</div>
    <button class="open-btn" id="btn-open-main">
      <span>📂</span> Open HTML File
    </button>
    <div class="recent-section" id="recent-section" style="display:none">
      <div class="recent-label">Recent Files</div>
      <div class="recent-list" id="recent-list"></div>
    </div>
  </div>

  <!-- IFRAME VIEWER -->
  <iframe id="viewer" sandbox="allow-scripts allow-same-origin allow-forms allow-modals allow-popups" title="HTML Viewer"></iframe>
</div>

<!-- BOTTOM BAR (shown when file is loaded) -->
<div id="bottombar">
  <button class="bb-btn" id="bb-open">📂 <span>Open</span></button>
  <button class="bb-btn" id="bb-zoom-out">➖ <span>Zoom</span></button>
  <button class="bb-btn" id="bb-zoom-in">➕ <span>Zoom</span></button>
  <button class="bb-btn" id="bb-fullscreen">⛶ <span>Full</span></button>
  <button class="bb-btn" id="bb-share">↗ <span>Share</span></button>
</div>

<!-- FILE INPUT (hidden) -->
<input type="file" id="file-input" accept=".html,.htm" style="display:none" />

<!-- TOAST -->
<div id="toast"></div>

<script>
  const fileInput   = document.getElementById('file-input');
  const viewer      = document.getElementById('viewer');
  const urlBar      = document.getElementById('url-bar');
  const bottombar   = document.getElementById('bottombar');
  const recentSection = document.getElementById('recent-section');
  const recentList  = document.getElementById('recent-list');
  const toast       = document.getElementById('toast');

  let currentBlob   = null;
  let currentName   = '';
  let zoomLevel     = 1.0;
  let recentFiles   = JSON.parse(localStorage.getItem('htmlviewer_recent') || '[]');

  // ── TOAST ──
  function showToast(msg, color = 'var(--accent)') {
    toast.textContent = msg;
    toast.style.background = color;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }

  // ── OPEN FILE ──
  function triggerOpen() { fileInput.click(); }
  document.getElementById('btn-open').addEventListener('click', triggerOpen);
  document.getElementById('btn-open-main').addEventListener('click', triggerOpen);
  document.getElementById('bb-open').addEventListener('click', triggerOpen);

  fileInput.addEventListener('change', (e) => {
    const file = e.target.files[0];
    if (!file) return;
    loadFile(file);
    fileInput.value = '';
  });

  function loadFile(file) {
    if (currentBlob) URL.revokeObjectURL(currentBlob);
    const reader = new FileReader();
    reader.onload = (ev) => {
      const html = ev.target.result;
      const blob = new Blob([html], { type: 'text/html' });
      currentBlob = URL.createObjectURL(blob);
      currentName = file.name;

      viewer.src = currentBlob;
      urlBar.value = file.name;
      document.body.classList.add('has-file');
      bottombar.classList.add('visible');
      zoomLevel = 1.0;
      applyZoom();
      showToast(`Loaded: ${file.name}`);
      saveRecent(file.name, file.size);
    };
    reader.readAsText(file);
  }

  // ── REFRESH ──
  document.getElementById('btn-refresh').addEventListener('click', () => {
    if (!currentBlob) return;
    viewer.src = currentBlob;
    showToast('Reloaded ↺');
  });

  // ── ZOOM ──
  function applyZoom() {
    viewer.style.transform = `scale(${zoomLevel})`;
    viewer.style.transformOrigin = 'top left';
    viewer.style.width  = `${100 / zoomLevel}%`;
    viewer.style.height = `${100 / zoomLevel}%`;
  }
  document.getElementById('bb-zoom-in').addEventListener('click', () => {
    zoomLevel = Math.min(zoomLevel + 0.15, 3.0);
    applyZoom();
    showToast(`Zoom ${Math.round(zoomLevel * 100)}%`);
  });
  document.getElementById('bb-zoom-out').addEventListener('click', () => {
    zoomLevel = Math.max(zoomLevel - 0.15, 0.3);
    applyZoom();
    showToast(`Zoom ${Math.round(zoomLevel * 100)}%`);
  });

  // ── FULLSCREEN ──
  document.getElementById('bb-fullscreen').addEventListener('click', () => {
    if (!document.fullscreenElement) {
      document.documentElement.requestFullscreen().catch(() => {});
      showToast('Fullscreen on');
    } else {
      document.exitFullscreen();
      showToast('Fullscreen off');
    }
  });

  // ── SHARE ──
  document.getElementById('bb-share').addEventListener('click', async () => {
    if (!currentBlob || !currentName) return;
    if (navigator.share) {
      try {
        const resp = await fetch(currentBlob);
        const blob = await resp.blob();
        const file = new File([blob], currentName, { type: 'text/html' });
        await navigator.share({ files: [file], title: currentName });
      } catch {}
    } else {
      // fallback: copy blob URL
      navigator.clipboard?.writeText(currentBlob)
        .then(() => showToast('URL copied!'))
        .catch(() => showToast('Share not supported'));
    }
  });

  // ── RECENT FILES ──
  function saveRecent(name, size) {
    recentFiles = recentFiles.filter(f => f.name !== name);
    recentFiles.unshift({ name, size, ts: Date.now() });
    recentFiles = recentFiles.slice(0, 5);
    localStorage.setItem('htmlviewer_recent', JSON.stringify(recentFiles));
    renderRecent();
  }

  function renderRecent() {
    if (!recentFiles.length) { recentSection.style.display = 'none'; return; }
    recentSection.style.display = '';
    recentList.innerHTML = '';
    recentFiles.forEach(f => {
      const el = document.createElement('div');
      el.className = 'recent-item';
      const kb = f.size ? ` · ${(f.size/1024).toFixed(1)}KB` : '';
      el.innerHTML = `
        <div class="ri-icon">📄</div>
        <div class="ri-name">${escHtml(f.name)}</div>
        <div class="ri-size">${kb}</div>
      `;
      el.addEventListener('click', () => {
        showToast('Re-open file via the 📂 button to load it again', 'var(--accent2)');
      });
      recentList.appendChild(el);
    });
  }

  function escHtml(s) {
    return s.replace(/[&<>"']/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  // ── DRAG & DROP (desktop/Chrome) ──
  document.addEventListener('dragover', e => e.preventDefault());
  document.addEventListener('drop', e => {
    e.preventDefault();
    const file = e.dataTransfer?.files[0];
    if (file && (file.name.endsWith('.html') || file.name.endsWith('.htm'))) {
      loadFile(file);
    } else if (file) {
      showToast('Please drop an .html file', 'var(--accent2)');
    }
  });

  // ── INIT ──
  renderRecent();
</script>
</body>
</html>
