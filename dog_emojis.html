<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dog Emoji Controller</title>
    <style>
        :root {
            --bg: #0f172a;
            --card: #1e293b;
            --accent: #38bdf8;
            --text: #f8fafc;
        }

        body {
            font-family: 'Inter', system-ui, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            background: var(--card);
            padding: 2.5rem;
            border-radius: 24px;
            box-shadow: 0 25px 50px -12px rgba(0,0,0,0.5);
            text-align: center;
            width: 320px;
        }

        #emoji-viewer {
            width: 250px;
            height: 250px;
            margin: 0 auto 1.5rem;
            border: 4px solid var(--accent);
            border-radius: 20px;
            background-color: #000;
            
            /* THIS IS THE DIRECT DRIVE LINK LOGIC */
            background-image: url('https://lh3.googleusercontent.com/u/0/d/1Qanjg4hrXBIA7QMfOpjz39ov2NoeDBUI');
            
            background-repeat: no-repeat;
            background-size: 200% 400%; /* 2 columns, 4 rows */
            
            /* Start on the Sad Dog (Column 2, Row 3) */
            background-position: 100% 66.6%; 
            transition: background-position 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        h2 { margin: 0 0 1rem; font-weight: 800; color: var(--accent); }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        button {
            padding: 12px;
            border: 1px solid #334155;
            border-radius: 12px;
            background: #1e293b;
            color: #94a3b8;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
        }

        button:hover {
            background: var(--accent);
            color: #0f172a;
            border-color: var(--accent);
            transform: translateY(-2px);
        }

        button.active {
            background: var(--accent);
            color: #0f172a;
        }

        .hint {
            margin-top: 1.5rem;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2 id="label">Sad Dog</h2>
        <div id="emoji-viewer"></div>

        <div class="grid">
            <button onclick="view('Suspicious', 0, 0)">Suspicious</button>
            <button onclick="view('Happy', 100, 0)">Happy</button>
            <button onclick="view('Angry', 0, 33.3)">Angry</button>
            <button onclick="view('Wink', 100, 33.3)">Wink</button>
            <button onclick="view('Surprised', 0, 66.6)">Surprised</button>
            <button onclick="view('Sad', 100, 66.6)" class="active">Sad</button>
            <button onclick="view('Side-Eye', 0, 100)">Side-Eye</button>
            <button onclick="view('Puppy Eyes', 100, 100)">Puppy Eyes</button>
        </div>

        <p class="hint">Coordinate-based Sprite Sheet System</p>
    </div>

    <script>
        function view(name, x, y) {
            const viewer = document.getElementById('emoji-viewer');
            const label = document.getElementById('label');
            
            // Update the display
            viewer.style.backgroundPosition = `${x}% ${y}%`;
            label.innerText = `${name} Dog`;

            // Update button styles
            document.querySelectorAll('button').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
        }
    </script>

</body>
</html>
